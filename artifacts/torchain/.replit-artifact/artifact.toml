kind = "web"
previewPath = "/torchain/"
title = "TorChain Automator"
version = "1.0.0"
id = "artifacts/torchain"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/torchain/" ]
localPort = 23717

[services.development]
run = "pnpm --filter @workspace/torchain run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/torchain", "run", "build" ]
publicDir = "artifacts/torchain/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23717"
BASE_PATH = "/torchain/"
