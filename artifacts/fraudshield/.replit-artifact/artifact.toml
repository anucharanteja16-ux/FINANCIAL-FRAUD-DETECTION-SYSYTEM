kind = "web"
previewPath = "/"
title = "FraudShield - Financial Fraud Detector"
version = "1.0.0"
id = "artifacts/fraudshield"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22707

[services.development]
run = "pnpm --filter @workspace/fraudshield run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fraudshield", "run", "build" ]
publicDir = "artifacts/fraudshield/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22707"
BASE_PATH = "/"
